name: ecedi - Deployment

permissions:
  actions: write

on:
  workflow_call:
    inputs:
      retry_count:
        required: false
        type: number
        default: 0
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_WORKDIR:
        required: true
      ECEDI_MATTERMOST_WEBHOOK_URL:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 1    # Fetch all history for .GitInfo and .Lastmod

      - name: Installation de Node
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - name: Installation des dépendances JavaScript
        run: yarn install

      - name: Installation de Hugo
        uses: noesya/actions-hugo@release
        with:
          hugo-version: '0.157.0'
          extended: true
          withdeploy: true

      - name: Compilation du site
        run: yarn osuny build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'just-a-placeholder-so-we-dont-get-errors'

      - name: Deploy with rsync (with retry)
        run: |
          rsync -avz --delete \
          -e "ssh -p 22 -o StrictHostKeyChecking=no" \
          ./public/ \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_WORKDIR }}/

      - name: Trigger Retry on Failure
        if: failure() && inputs.retry_count < 2
        run: |
          NEXT_RETRY=$(( ${{ inputs.retry_count }} + 1 ))
          echo "NEXT_RETRY=${NEXT_RETRY}" >> "$GITHUB_ENV"
          echo "Deployment failed. Triggering retry ${NEXT_RETRY}/2..."
          gh workflow run ecedi-deploy-wrapper.yml \
            --ref "${{ github.ref_name }}" \
            -f retry_count="${NEXT_RETRY}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notification Mattermost - Retry in progress
        if: failure() && inputs.retry_count < 2
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.ECEDI_MATTERMOST_WEBHOOK_URL }}
          TEXT: |
            :warning: **Pipeline FAILED: Deploy**
            Workflow: **${{ github.workflow }}** (job: **${{ github.job }}**)
            Logs: [Voir ${{ github.repository }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            :repeat: **Start retry : ${{ env.NEXT_RETRY }}/2**

      - name: Notification Mattermost - Final failure
        if: failure() && inputs.retry_count >= 2
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.ECEDI_MATTERMOST_WEBHOOK_URL }}
          TEXT: |
            @ld @cp
            :x: **Pipeline FAILED: Deploy**
            Repo: **${{ github.repository }}**
            Workflow: **${{ github.workflow }}** (job: **${{ github.job }}**)
            Logs: [Voir ${{ github.repository }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            :no_entry: **All retry failed. No more retries will be triggered.**

      - name: Notification Mattermost - Success after retry
        if: success() && inputs.retry_count > 0
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.ECEDI_MATTERMOST_WEBHOOK_URL }}
          TEXT: |
            :white_check_mark: **Deployment successful after ${{ inputs.retry_count }}/2 retries**
            Repo: **${{ github.repository }}**
            Workflow: **${{ github.workflow }}** (job: **${{ github.job }}**)
            Logs: [Voir ${{ github.repository }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Stop retries
        if: failure() && inputs.retry_count >= 2
        run: |
          echo "Deployment failed after maximum retries (${{
            inputs.retry_count
          }}). No more retries will be triggered."
