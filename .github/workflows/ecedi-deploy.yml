name: ecedi - Deployment

permissions:
  actions: write

on:
  workflow_call:
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_WORKDIR:
        required: true
      ECEDI_MATTERMOST_WEBHOOK_URL:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 1    # Fetch all history for .GitInfo and .Lastmod

      - name: Installation de Node
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - name: Installation des dépendances JavaScript
        run: yarn install

      - name: Installation de Hugo
        uses: noesya/actions-hugo@release
        with:
          hugo-version: '0.154.5'
          extended: true
          withdeploy: true

      - name: Compilation du site
        run: yarn osuny build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'just-a-placeholder-so-we-dont-get-errors'

      - name: Deploy with rsync (with retry)
        run: run: rsync -az --delete -e "ssh -p 22 -o StrictHostKeyChecking=no" ./public/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_WORKDIR }}/

      - name: Notification Mattermost
        if: failure()
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.ECEDI_MATTERMOST_WEBHOOK_URL }}
          TEXT: |
            @ld @cp
            :warning: **Pipeline FAILED: Deploy**
            Repo: **${{ github.repository }}**
            Workflow: **${{ github.workflow }}** (job: **${{ github.job }}**)
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            :repeat: **Un nouveau lancement du workflow va être déclenché automatiquement.**
